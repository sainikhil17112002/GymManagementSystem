{% extends 'gymove/elements/layouts/admin.html' %}
{% load static %}


{% block content %}


<div class="content-body default-height">

<div class="container-fluid">


<div class="row">


<div class="col-xl-6">


<div class="card">


<div class="card-header">

<h4 class="card-title">
Add Expense
</h4>

</div>



<div class="card-body">


<form method="POST">

{% csrf_token %}



<div class="mb-3">

<label>
Expense Title
</label>

<input 
type="text"
name="title"
class="form-control"
placeholder="Example: Electricity Bill"
required>

</div>



<div class="mb-3">

<label>
Amount
</label>

<input 
type="number"
name="amount"
class="form-control"
placeholder="Enter amount"
required>

</div>



<div class="mb-3">

<label>
Category
</label>

<input 
type="text"
name="category"
class="form-control"
placeholder="Example: Maintenance">

</div>



<div class="mb-3">

<label>
Date
</label>

<input 
type="date"
name="date"
class="form-control"
required>

</div>




<button 
type="submit"
class="btn btn-primary">

Save Expense

</button>


</form>


</div>


</div>


</div>


</div>


</div>


</div>


{% endblock %}
