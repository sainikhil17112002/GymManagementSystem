{% extends 'gymove/elements/layouts/admin.html' %}

{% block content %}

<div class="content-body">

<div class="container-fluid">


<div class="card">


<div class="card-header">

<h4>
Edit Membership Plan
</h4>

</div>



<div class="card-body">


<form method="POST">

{% csrf_token %}


<div class="row">



<div class="col-md-6 mb-3">

<label>
Plan ID
</label>

<input 
type="text"
class="form-control"
value="{{ plan.plan_id }}"
readonly>

</div>




<div class="col-md-6 mb-3">

<label>
Plan Name
</label>

<input 
type="text"
name="plan_name"
class="form-control"
value="{{ plan.plan_name }}"
required>

</div>




<div class="col-md-6 mb-3">

<label>
Duration (Months)
</label>

<input 
type="number"
name="duration"
class="form-control"
value="{{ plan.duration }}"
min="1"
required>

</div>




<div class="col-md-6 mb-3">

<label>
Price
</label>

<input 
type="number"
name="price"
class="form-control"
value="{{ plan.price }}"
required>

</div>




<div class="col-md-12 mb-3">

<label>
Description
</label>

<textarea
name="description"
class="form-control"
rows="4">{{ plan.description }}</textarea>

</div>



</div>




<button 
type="submit"
class="btn btn-primary">

Update Plan

</button>



<a href="{% url 'gymove:membership-plan-list' %}"
class="btn btn-light">

Cancel

</a>



</form>


</div>


</div>


</div>


</div>


{% endblock %}
