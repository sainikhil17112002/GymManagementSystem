{% extends 'gymove/elements/layouts/admin.html' %}

{% block content %}

<div class="content-body default-height">
    <div class="container-fluid">

        <div class="card">
            <div class="card-header">
                <h4 class="text-black font-w600">
                    Create Announcement
                </h4>
            </div>

            <div class="card-body">

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">
                            Title
                        </label>

                        <input 
                            type="text"
                            name="title"
                            class="form-control"
                            placeholder="Announcement title">
                    </div>


                    <div class="mb-3">
                        <label class="form-label">
                            Description
                        </label>

                        <textarea
                            name="description"
                            class="form-control"
                            rows="5"
                            placeholder="Write announcement"></textarea>
                    </div>


                    <button type="submit" class="btn btn-primary">
                        Publish Announcement
                    </button>

                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
